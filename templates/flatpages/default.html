<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Bare - Start Bootstrap Template</title>
        <!-- Favicon-->
        <!-- Core theme CSS (includes Bootstrap)-->
        {% load static %}
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    </head>
    <body>
        <!-- Responsive navbar-->
<nav
        class="navbar navbar-expand-lg navbar-dark bg-dark static-top">
   <div class="container">
       <a class="navbar-brand" href="#">Django flatpages</a>
       <button class="navbar-toggler" type="button" data-toggle="collapse"
               data-target="#navbarResponsive"
               aria-controls="navbarResponsive" aria-expanded="false"
               aria-label="Toggle navigation">
           <span class="navbar-toggler-icon"></span>
       </button>
       <div class="collapse navbar-collapse" id="navbarResponsive">
           <ul class="navbar-nav ml-auto">
               <li class="nav-item">
                   <a class="nav-link" href="/news/">News</a>
               </li>
               <li class="nav-item">
                   <a class="nav-link" href="/news/search/">Search</a>
               </li>
               <li class="nav-item">
                   <a class="nav-link" href="/news/news/create/">Create NW</a>
               </li>
               <li class="nav-item">
                   <a class="nav-link" href="/news/articles/create/">Create AR</a>
               </li>
               {% if user.is_authenticated %}
                    <li class="nav-item">
        <!-- Форма для отправки POST-запроса -->
                        <form action="{% url 'logout' %}" method="post" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-link">Выйти</button>
                        </form>
                    </li>
               {% else %}
                    <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    </li>
               {% endif %}
           </ul>
       </div>
   </div>
</nav>

<!-- Page content-->
<div class="container">
   <div class="row">
       <div class="col-lg-12 text-center">
           {% block content %}
           {% endblock content %}
       </div>
   </div>
</div>
</body>
</html>
